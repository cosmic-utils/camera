#
# The Flathub preview screenshots, in the order they appear in
# resources/io.github.cosmic_utils.camera.metainfo.xml.
#
# Format:  number|source|window|steps|settle_ms|config|description
#
#   number       preview-<number>.png, and the <screenshot> it maps to
#   source       image under preview/source/ used as the fake camera feed
#   window       window size in logical pixels; 900x700 is Flathub's
#                recommended standard-display size, 400x880 is a modern Linux
#                phone aspect (PinePhone Pro / Librem 5 / Volla)
#   steps        comma-separated UI steps, each a keyboard shortcut, see
#                STEP_KEYS in capture-previews.sh, which mirrors the defaults in
#                src/app/keybind/action.rs
#   settle_ms    wait between the last step and the capture, for animations and
#                anything that only finishes on a later frame (QR decoding, the
#                recording timer ticking past 00:01)
#   config       extra cosmic-config fields as comma-separated field=value, for
#                state with no keyboard shortcut. Values are RON, so bare
#                `true` / `false` for a bool. Applied before launch, since the
#                app reads its config once at startup.
#   description  what the shot is meant to show
#
# `seed-photo` places the shot's source image in the gallery directory before
# launch, so the gallery button shows a thumbnail instead of an empty
# placeholder, since the app is launched with a fresh HOME.

001|0001.jpg|900x700|seed-photo,tools-menu|1200||Photo mode with tools menu open (landscape)
# The phone shot is the one that shows the whole frame: on a tall window a
# filling preview crops the 16:9 feed down to a narrow slice of itself.
002|0007.jpg|400x880|seed-photo|1200|preview_fit_to_view=true|Photo mode on a Linux phone
003|0006.jpg|900x700|seed-photo,filters|1500||Filter picker
# Recording runs for 7s before the capture so the elapsed timer reads a
# believable duration rather than 00:00.
004|0003.jpg|900x700|video-mode,record|7000|record_audio=false|Video recording in progress
005|0009.jpg|900x700|seed-photo|3000||QR code detection
006|0008.jpg|900x700|seed-photo,settings|1500||Advanced settings
